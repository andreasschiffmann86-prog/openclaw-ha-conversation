name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # matches  1.0.0
      - "v[0-9]+.[0-9]+.[0-9]+"  # matches v1.0.0

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"   # strip leading 'v' if present
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/openclaw_conversation/manifest.json'))['version'])")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $MANIFEST_VERSION"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          python3 - <<'EOF'
          import re, sys

          version = "${{ steps.version.outputs.version }}"
          with open("CHANGELOG.md") as f:
              content = f.read()

          # Find the section that starts with ## [VERSION]
          pattern = rf"(## \[{re.escape(version)}\].*?)(?=\n## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if match:
              notes = match.group(1).strip()
          else:
              notes = f"Release {version}"

          with open("release_notes.txt", "w") as f:
              f.write(notes)
          print("Extracted release notes:")
          print(notes)
          EOF

      - name: Create zip archive for HACS
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          zip -r "openclaw_conversation-${VERSION}.zip" \
            custom_components/openclaw_conversation/ \
            hacs.json \
            README.md \
            CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          files: "openclaw_conversation-${{ steps.version.outputs.version }}.zip"
          draft: false
          prerelease: false
